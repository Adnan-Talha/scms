<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <link rel="stylesheet" href="/css/style.css">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>Scholarship Admin</h2>
        <ul>
            <li><a href="/admin/dashboard">🏠 dashboard</a></li>
            <li><a href="/admin/scholarships">🎓 Scholarships</a></li>
            <li><a href="/admin/applications">📝 Applications</a></li>
            <li><a href="/admin/messages">✉️ Messages</a></li>
            <li><a href="/admin/logout">🚪 Logout</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="topbar">
            <input type="text" placeholder="Search...">
            <div class="notifications">🔔</div>
        </div>

        <div class="content-area">
            <h1>Messages</h1>
            <ul class="messages-list">
                <li th:each="msg : ${messages}">
                    <strong th:text="${msg.name}">Name</strong>: 
                    <span th:text="${msg.message}">Message</span> 
                    (<em th:text="${msg.email}">Email</em>)
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
