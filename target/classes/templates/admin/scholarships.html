<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scholarships</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		.sidebar {
		  width: 270px;
		  background: #2c3e50;
		  min-height: 100vh;
		  color: white;
		  padding: 20px;
		}

		.sidebar h2 {
		  text-align: center;
		  margin-bottom: 30px;
		  font-size: 24px;
		}

		.sidebar ul {
		  list-style: none;
		}

		.sidebar ul li {
		  margin: 2px 0;
		}

		.sidebar ul li a {
		  color: white;
		  text-decoration: none;
		  display: block;
		  padding: 10px;
		  transition: 0.3s;
		}

		.sidebar ul li a:hover {
		  background-color: #1a252f;
		  padding-left: 15px;
		}

	</style>
</head>
<body>
<div class="container">
    
<div class="sidebar">
  <h2>Scholarship Admin</h2>
  <ul>
              <li><a href="/admin/dashboard">🏠 dashboard</a></li>
              <li><a href="/admin/scholarships">🎓 Scholarships</a></li>
              <li><a href="/admin/applications">📝 Applications</a></li>
              <li><a href="/admin/messages">✉️ Messages</a></li>
              <li><a href="/admin/logout">🚪 Logout</a></li>
          </ul>
</div>

    <div class="main-content">
        
<div class="topbar">
  <input type="text" placeholder="Search...">
  <div class="notifications">🔔</div>
</div>

        <div class="content-area">
            
    <h1>Manage Scholarships</h1>
    <table>
        <thead><tr><th>Scholarship Name</th><th>Type</th><th>Amount</th><th>Actions</th></tr></thead>
        <tbody><tr><td>Merit Scholarship</td><td>Merit-Based</td><td>₹10,000</td><td>Edit | Delete</td></tr></tbody>
    </table>
    
        </div>
    </div>
</div>
<script>

	// Chart.js - Scholarships by Category
	const ctx2 = document.getElementById('categoriesChart');
	if (ctx2) {
	    new Chart(ctx2, {
	        type: 'pie',
	        data: {
	            labels: ['Merit-Based', 'Need-Based', 'Sports', 'Other'],
	            datasets: [{
	                label: 'Categories',
	                data: [45, 30, 15, 10],
	                backgroundColor: [
	                    'rgba(75, 192, 192, 0.6)',
	                    'rgba(255, 206, 86, 0.6)',
	                    'rgba(255, 99, 132, 0.6)',
	                    'rgba(153, 102, 255, 0.6)'
	                ]
	            }]
	        },
	        options: {
	            responsive: true
	        }
	    });
	}
</script>
</body>
</html>
